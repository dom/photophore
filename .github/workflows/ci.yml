name: photophore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cross-repo path resolution: tests + harness derive sibling-repo paths from
# THERMOCLINE_SUITE_ROOT. ${{ github.workspace }} is the directory that contains
# all sibling checkouts (photophore/, thermocline/, seamount/) for these jobs.
env:
  THERMOCLINE_SUITE_ROOT: ${{ github.workspace }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photophore
      - uses: actions/checkout@v4
        with:
          repository: dom/thermocline
          path: thermocline
          # Sibling repo is private; default GITHUB_TOKEN is scoped to the
          # running repo only. SUITE_REPOS_TOKEN is a fine-grained PAT with
          # Contents: Read on dom/{thermocline,photophore,seamount}.
          token: ${{ secrets.SUITE_REPOS_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install thermocline + photophore
        working-directory: photophore/python
        run: |
          pip install -e ../../thermocline/thermocline/python/
          pip install -e .[dev]
      - name: Network-isolation lint (DISP-05)
        working-directory: photophore
        run: |
          python tools/ast_lint_network_isolation.py \
            python/src/ \
            ../thermocline/thermocline/python/src/
      - name: Print lint (CONF-06)
        working-directory: photophore
        run: python tools/ast_lint_no_print.py python/src/
      - name: AT coverage (photophore = AT-A*)
        working-directory: photophore
        run: python tools/at_coverage.py
      - name: Pytest (non-integration)
        working-directory: photophore/python
        run: pytest tests/ --ignore=tests/integration -q

  integration-and-conformance:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        forge: [pi-forge, describe-forge]
    steps:
      - uses: actions/checkout@v4
        with:
          path: photophore
      - uses: actions/checkout@v4
        with:
          repository: dom/thermocline
          path: thermocline
          token: ${{ secrets.SUITE_REPOS_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: dom/seamount
          path: seamount
          token: ${{ secrets.SUITE_REPOS_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install thermocline + photophore + forge + forge_conformance
        run: |
          pip install -e thermocline/thermocline/python/
          pip install -e "photophore/python/[dev]"
          pip install -e seamount/${{ matrix.forge }}/
          pip install -e seamount/conformance/
          pip install flask
      - name: Run photophore integration tests
        working-directory: photophore/python
        run: pytest tests/integration/ -xvs
      - name: Init + serve ${{ matrix.forge }}
        run: |
          MODULE=${{ matrix.forge == 'pi-forge' && 'pi_forge' || 'describe_forge' }}
          python -m "$MODULE" init --keyring-service seamount.ci-test
          python -m "$MODULE" serve --keyring-service seamount.ci-test --port 5100 &
          sleep 3
      - name: Run forge_conformance against ${{ matrix.forge }}
        run: |
          python -m forge_conformance \
            --target http://127.0.0.1:5100 \
            --role ${{ matrix.forge }} \
            --output json
